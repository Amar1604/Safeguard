<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SafeGuard</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <!-- Config loader -->
    <script src="config.js"></script>
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
            transition: all 0.3s ease;
        }
        .auth-card h2 {
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 26px;
            text-align: center;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content" style="justify-content: center;">
                <div class="logo">
                    <div class="logo-icon">🛡️</div>
                    <h1>SafeGuard</h1>
                </div>
            </div>
        </header>

        <div class="auth-container">
            <div class="auth-card">
                <h2>Login to SafeGuard</h2>
                <form id="loginForm" onsubmit="loginPageSubmit(event)">
                    <div class="form-group">
                        <label for="loginEmail">Email:</label>
                        <input type="email" class="form-control" id="loginEmail" placeholder="your.email@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password:</label>
                        <input type="password" class="form-control" id="loginPassword" placeholder="Enter your password" required>
                    </div>
                    <button class="btn" type="submit" style="width: 100%; margin-top: 10px;">Login</button>
                    
                    <div style="margin-top: 20px; text-align: center; font-size: 14px;">
                        <a href="register.html" style="color: #3498db; text-decoration: none; font-weight: 600;">Don't have an account? Register</a>
                    </div>
                    <div style="margin-top: 10px; text-align: center; font-size: 14px;">
                        <a href="index.html" style="color: #7f8c8d; text-decoration: none;">← Back to Dashboard</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="index.js"></script>
    <script>
        // Special form submit for the standalone login page
        function loginPageSubmit(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            firebase.auth().signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    alert('Login successful!');
                    window.location.href = 'index.html';
                })
                .catch((error) => {
                    alert('Login failed: ' + error.message);
                });
        }
    </script>
</body>
</html>
