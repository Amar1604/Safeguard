<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SafeGuard - Real-time Admin Location Tracker</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.8.0/dist/leaflet.css" />
  
  <!-- Firebase compat -->
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
  
  <!-- Config loader -->
  <script src="config.js"></script>
  
  <style>
    :root {
      --primary: #818cf8;
      --primary-gradient: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      --danger: #ef4444;
      --danger-gradient: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      --bg: #0b0f19;
      --panel-bg: rgba(17, 24, 39, 0.85);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f3f4f6;
      --text-muted: #9ca3af;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100vh;
      z-index: 1;
    }

    /* Glassmorphic Header overlay */
    .admin-header {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1000;
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 15px 25px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-width: 380px;
    }

    .admin-header h1 {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .admin-header h1 span {
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-badge {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 5px;
    }

    .indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #9ca3af;
    }

    .indicator.active {
      background: #34d399;
      box-shadow: 0 0 8px #34d399;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .btn-stop {
      background: var(--danger-gradient);
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      margin-top: 10px;
      width: 100%;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3);
      transition: all 0.3s ease;
    }

    .btn-stop:hover {
      background: var(--danger);
      transform: translateY(-1px);
      box-shadow: 0 6px 15px rgba(239, 68, 68, 0.5);
    }

    @keyframes slideIn {
      from { transform: translateX(120%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
</head>
<body>
  
  <div class="admin-header">
    <h1>🛡️ SafeGuard <span>Admin Tracker</span></h1>
    <div class="status-badge">
      <div class="indicator active" id="statusIndicator"></div>
      <span id="statusText">Initializing database connection...</span>
    </div>
    <button id="stopBtn" class="btn-stop" onclick="stopSharing()" style="display: none;">Stop My Location sharing</button>
  </div>

  <div id="map"></div>

  <!-- leaflet js  -->
  <script src="https://unpkg.com/leaflet@1.8.0/dist/leaflet.js"></script>
  <script>
    // Firebase configuration loaded from config.js
    const firebaseConfig = loadFirebaseConfig();
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    // Generate unique user ID
    const userId = 'admin_' + Math.random().toString(36).substr(2, 9);
    
    // Web Audio warning beep generator
    function playBeep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        
        osc.connect(gain);
        gain.connect(ctx.destination);
        
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        osc.frequency.setValueAtTime(440, ctx.currentTime + 0.15);
        
        gain.gain.setValueAtTime(0.12, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        
        osc.start();
        osc.stop(ctx.currentTime + 0.35);
      } catch (e) {
        console.warn('Audio Context error:', e);
      }
    }

    // Listen for emergency alerts
    database.ref('alerts').on('child_added', (snapshot) => {
        const alert = snapshot.val();
        const alertUserId = snapshot.key;
        if (alertUserId !== userId) {
            showEmergencyAlert(alert, alertUserId);
        }
    });
    
    function showEmergencyAlert(alert, alertUserId) {
        // Play siren/beep alarm
        playBeep();

        // Show notification overlay
        const notification = document.createElement('div');
        notification.style.cssText = `
            position: fixed; top: 20px; right: 20px; z-index: 9999;
            background: rgba(239, 68, 68, 0.9); color: white; padding: 15px 22px;
            border-radius: 12px; font-size: 14px; font-weight: 500;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            max-width: 300px;
        `;
        notification.innerHTML = `
            <div style="font-weight: 700; margin-bottom: 5px;">🚨 EMERGENCY SOS ACTIVE</div>
            <div style="font-size: 12px; opacity: 0.9;">User: ${alertUserId}</div>
            <div style="font-size: 12px; opacity: 0.9;">Coords: ${alert.lat.toFixed(5)}°, ${alert.lng.toFixed(5)}°</div>
        `;
        document.body.appendChild(notification);
        
        // Center map on emergency location
        map.setView([alert.lat, alert.lng], 16);
        
        // Remove notification after 8 seconds
        setTimeout(() => {
            if (notification.parentElement) {
                notification.remove();
            }
        }, 8000);
    }
    
    // Map initialization
    var map = L.map('map').setView([28.6139, 77.2090], 6); // Default center: Delhi
    var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    });
    osm.addTo(map);
    
    var userMarkers = {};
    
    // Listen for location updates from all users
    database.ref('locations').on('value', (snapshot) => {
        if (!map) return;
        const locations = snapshot.val();
        
        // Remove markers for users no longer sharing location
        Object.keys(userMarkers).forEach(markerId => {
            if (markerId.endsWith('_circle')) return;
            if (!locations || !locations[markerId]) {
                if (userMarkers[markerId]) {
                    map.removeLayer(userMarkers[markerId]);
                    delete userMarkers[markerId];
                }
                if (userMarkers[markerId + '_circle']) {
                    map.removeLayer(userMarkers[markerId + '_circle']);
                    delete userMarkers[markerId + '_circle'];
                }
            }
        });
        
        // Add/update markers for current users
        if (locations) {
            Object.keys(locations).forEach(id => {
                if (id !== userId) {
                    updateUserMarker(id, locations[id]);
                }
            });
        }
    });
    
    function updateUserMarker(id, location) {
        if (!map) return;
        if (!location || typeof location.lat !== 'number' || typeof location.lng !== 'number') {
            return;
        }
        
        if (userMarkers[id]) {
            map.removeLayer(userMarkers[id]);
        }
        if (userMarkers[id + '_circle']) {
            map.removeLayer(userMarkers[id + '_circle']);
        }
        
        const isEmergency = location.emergency === true;
        const isLastKnown = location.lastKnown === true;
        
        let markerIcon, popupText;
        
        if (isEmergency) {
            // Red marker for active emergency
            markerIcon = L.divIcon({
                html: '<div style="background: #ef4444; width: 22px; height: 22px; border-radius: 50%; border: 3px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.5); animation: pulse 1.2s infinite;"></div>',
                iconSize: [22, 22],
                className: 'emergency-marker'
            });
            popupText = `🚨 EMERGENCY: ${id}<br>📍 ${location.lat.toFixed(4)}°, ${location.lng.toFixed(4)}°<br>⏰ ${new Date(location.timestamp).toLocaleTimeString()}<br><button onclick="adminResolveAlert('${id}')" style="background: #10b981; color: white; border: none; padding: 6px 10px; border-radius: 4px; font-weight: bold; margin-top: 8px; cursor: pointer; width: 100%; font-family: 'Inter', sans-serif;">Resolve Alert</button>`;
        } else if (isLastKnown) {
            // Gray marker for last known position
            markerIcon = L.divIcon({
                html: '<div style="background: #6b7280; width: 18px; height: 18px; border-radius: 50%; border: 2px solid white; opacity: 0.8;"></div>',
                iconSize: [18, 18],
                className: 'last-known-marker'
            });
            popupText = `📍 LAST KNOWN: ${id}<br>📍 ${location.lat.toFixed(4)}°, ${location.lng.toFixed(4)}°<br>⏰ Last seen: ${new Date(location.timestamp).toLocaleTimeString()}<br>🕐 Stopped: ${new Date(location.stoppedAt).toLocaleTimeString()}`;
        } else {
            // Blue marker for active sharing
            markerIcon = L.divIcon({
                html: '<div style="background: #3b82f6; width: 20px; height: 20px; border-radius: 50%; border: 2px solid white;"></div>',
                iconSize: [20, 20],
                className: 'active-marker'
            });
            popupText = `📍 ACTIVE: ${id}<br>📍 ${location.lat.toFixed(4)}°, ${location.lng.toFixed(4)}°<br>⏰ ${new Date(location.timestamp).toLocaleTimeString()}`;
        }
            
        userMarkers[id] = L.marker([location.lat, location.lng], { icon: markerIcon })
            .bindPopup(popupText)
            .addTo(map);
            
        // Add emergency circle for emergency locations only
        if (isEmergency) {
            userMarkers[id + '_circle'] = L.circle([location.lat, location.lng], {
                radius: location.accuracy || 100,
                color: '#ef4444',
                fillColor: '#ef4444',
                fillOpacity: 0.15
            }).addTo(map);
        }
    }
    
    // GPS Geolocation for Admin device
    var myMarker, myCircle;
    var locationInterval;
    var isSharing = false;
    var watchId;
    var lastUpdateTime = 0;
    var keepAliveInterval;
    
    if(!navigator.geolocation) {
        document.getElementById('statusText').innerHTML = 'Geolocation not supported in browser';
        document.getElementById('statusIndicator').style.background = '#f87171';
    } else {
        document.getElementById('statusText').innerHTML = 'Requesting GPS permission...';
        navigator.geolocation.getCurrentPosition(
            (position) => {
                document.getElementById('statusText').innerHTML = 'Admin sharing active ✓';
                document.getElementById('stopBtn').style.display = 'block';
                isSharing = true;
                getPosition(position);
                startLocationTracking();
            },
            handleError,
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
        );
    }
    
    function startLocationTracking() {
        watchId = navigator.geolocation.watchPosition(
            getPosition,
            handleError,
            { enableHighAccuracy: true, timeout: 15000, maximumAge: 30000 }
        );
        
        locationInterval = setInterval(() => {
            if (Date.now() - lastUpdateTime > 10000) {
                navigator.geolocation.getCurrentPosition(getPosition, handleError);
            }
        }, 8000);
        
        keepAliveInterval = setInterval(() => {
            if (isSharing) {
                database.ref('locations/' + userId + '/keepAlive').set(Date.now());
            }
        }, 30000);
    }
    
    function handleError(error) {
        console.log('Location error:', error);
        switch(error.code) {
            case error.PERMISSION_DENIED:
                document.getElementById('statusText').innerHTML = '❌ Location denied by user';
                document.getElementById('statusIndicator').style.background = '#f87171';
                break;
            case error.POSITION_UNAVAILABLE:
                document.getElementById('statusText').innerHTML = '❌ Location unavailable - retrying';
                setTimeout(() => {
                    if (isSharing) navigator.geolocation.getCurrentPosition(getPosition, handleError);
                }, 5000);
                break;
            case error.TIMEOUT:
                document.getElementById('statusText').innerHTML = '⏱️ Location timeout - retrying';
                setTimeout(() => {
                    if (isSharing) navigator.geolocation.getCurrentPosition(getPosition, handleError);
                }, 1000);
                break;
        }
    }
    
    function getPosition(position){
        if (!isSharing) return;
        
        var lat = position.coords.latitude;
        var lng = position.coords.longitude;
        var accuracy = position.coords.accuracy;
        
        lastUpdateTime = Date.now();
        
        // Update Firebase
        database.ref('locations/' + userId).set({
            lat: lat,
            lng: lng,
            accuracy: accuracy,
            timestamp: lastUpdateTime,
            keepAlive: lastUpdateTime
        });
        
        // Update own marker
        if(myMarker) {
            map.removeLayer(myMarker);
        }
        if(myCircle) {
            map.removeLayer(myCircle);
        }
        
        const adminIcon = L.divIcon({
            html: '<div style="background: #6366f1; width: 16px; height: 16px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.3);"></div>',
            iconSize: [16, 16]
        });
        
        myMarker = L.marker([lat, lng], { icon: adminIcon }).bindPopup('You are here (Admin)').addTo(map);
        myCircle = L.circle([lat, lng], {radius: accuracy, color: '#6366f1', fillOpacity: 0.1}).addTo(map);
        
        if (!window.locationSet) {
            map.setView([lat, lng], 15);
            window.locationSet = true;
        }
        
        document.getElementById('statusText').innerHTML = `Location active (${new Date().toLocaleTimeString()})`;
    }
    
    function stopSharing() {
        if (confirm('Stop sharing location?')) {
            isSharing = false;
            
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            if (locationInterval) {
                clearInterval(locationInterval);
                locationInterval = null;
            }
            if (keepAliveInterval) {
                clearInterval(keepAliveInterval);
                keepAliveInterval = null;
            }
            
            database.ref('locations/' + userId).remove();
            
            if (myMarker) {
                map.removeLayer(myMarker);
                myMarker = null;
            }
            if (myCircle) {
                map.removeLayer(myCircle);
                myCircle = null;
            }
            
            document.getElementById('statusText').innerHTML = 'Location sharing stopped';
            document.getElementById('statusIndicator').style.background = '#6b7280';
            document.getElementById('stopBtn').style.display = 'none';
            
            alert('Location sharing stopped successfully!');
        }
    }

    function adminResolveAlert(targetUserId) {
        if (confirm(`Are you sure you want to resolve the emergency alert for user: ${targetUserId}?`)) {
            // Update location database node
            database.ref('locations/' + targetUserId).update({
                emergency: false,
                lastKnown: true,
                stoppedAt: Date.now()
            }).then(() => {
                // Update alert status
                return database.ref('alerts/' + targetUserId).update({
                    status: 'RESOLVED',
                    resolvedAt: Date.now()
                });
            }).then(() => {
                // Clean up database reference after 4 seconds
                setTimeout(() => {
                    database.ref('alerts/' + targetUserId).remove();
                }, 4000);
                alert(`Alert for ${targetUserId} has been resolved successfully.`);
            }).catch(err => {
                alert('Failed to resolve alert: ' + err.message);
            });
        }
    }
  </script>
</body>
</html>
